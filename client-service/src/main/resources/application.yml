server:
  port: ${CLIENT_SERVICE_PORT:8081}

spring:
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:../.env.local[.properties]

  application:
    name: client-service

  datasource:
    url: ${CLIENT_DB_URL}
    username: ${CLIENT_DB_USERNAME}
    password: ${CLIENT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

app:
  messaging:
    client-events:
      exchange: ${CLIENT_EVENTS_EXCHANGE:client.exchange}
      created-queue: ${CLIENT_CREATED_QUEUE:client.created.queue}
      updated-queue: ${CLIENT_UPDATED_QUEUE:client.updated.queue}
      created-routing-key: ${CLIENT_CREATED_ROUTING_KEY:client.created}
      updated-routing-key: ${CLIENT_UPDATED_ROUTING_KEY:client.updated}

management:
  endpoints:
    web:
      exposure:
        include: health,info